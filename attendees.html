<!DOCTYPE html>
<html>
<head>
  <title>Paid Webinar Attendees</title>
  <style>
    body{
      font-family: Arial,sans-serif;
      max-width:1000px;
      margin:40px auto;
      padding:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      border:1px solid #ddd;
      padding:10px;
      text-align:left;
    }

    th{
      background:#f4f4f4;
    }

    .count{
      font-size:22px;
      font-weight:bold;
      margin-bottom:20px;
    }
  </style>
</head>
<body>

<h1>Paid Webinar Attendees</h1>

<div class="count" id="count">Loading...</div>

<input
  type="text"
  id="search"
  placeholder="Search name or email"
/>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Amount</th>
      <th>Registration Date</th>
    </tr>
  </thead>

  <tbody id="tbody"></tbody>
</table>

<script>
let attendees=[];

async function loadData(){

 const res = await fetch(
   "https://attedees.onrender.com"
 );

 const data = await res.json();

 attendees=data.attendees;

 document.getElementById("count").innerText =
   "Total Paid Users: " + data.total;

 render(attendees);
}

function render(list){

 const tbody=document.getElementById("tbody");

 tbody.innerHTML=list.map(user=>`
   <tr>
     <td>${user.name || "-"}</td>
     <td>${user.email || "-"}</td>
     <td>₹${user.amount}</td>
     <td>${new Date(user.createdAt)
       .toLocaleString()}</td>
   </tr>
 `).join("");
}

document
.getElementById("search")
.addEventListener("input",(e)=>{

 const value=e.target.value.toLowerCase();

 const filtered=attendees.filter(item=>
   (item.name || "")
   .toLowerCase()
   .includes(value)

   ||

   (item.email || "")
   .toLowerCase()
   .includes(value)
 );

 render(filtered);

});

loadData();
</script>

</body>
</html>
