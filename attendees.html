```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paid Webinar Attendees</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
    margin-bottom:20px;
    color:#222;
}

.count{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f1f1f1;
}

th,
td{
    padding:12px;
    border:1px solid #ddd;
    text-align:left;
}

tr:hover{
    background:#fafafa;
}

.loading{
    text-align:center;
    padding:20px;
}

.error{
    color:red;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Paid Webinar Attendees</h1>

<div id="count" class="count">
Loading...
</div>

<input
type="text"
id="search"
placeholder="Search name or email"
/>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Registration Date</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td colspan="4" class="loading">
Loading attendees...
</td>
</tr>
</tbody>
</table>

</div>

<script>

let attendees = [];

async function loadData() {

    try {

        const response = await fetch(
            "https://attedees.onrender.com/attendees"
        );

        const data = await response.json();

        console.log("Response:", data);

        attendees = Array.isArray(data) ? data : [];

        document.getElementById("count").innerText =
            `Total Paid Users: ${attendees.length}`;

        render(attendees);

    } catch (error) {

        console.error(error);

        document.getElementById("count").innerText =
            "Failed to load attendees";

        document.getElementById("tbody").innerHTML = `
            <tr>
                <td colspan="4" class="error">
                    Failed to fetch data
                </td>
            </tr>
        `;
    }
}

function render(users) {

    const tbody = document.getElementById("tbody");

    if (!users.length) {

        tbody.innerHTML = `
            <tr>
                <td colspan="4" class="loading">
                    No attendees found
                </td>
            </tr>
        `;

        return;
    }

    tbody.innerHTML = users.map(user => `
        <tr>
            <td>${user.name || "-"}</td>
            <td>${user.email || "-"}</td>
            <td>₹${user.amount || 0}</td>
            <td>
                ${
                    user.createdAt
                    ? new Date(user.createdAt).toLocaleString()
                    : "-"
                }
            </td>
        </tr>
    `).join("");
}

document
.getElementById("search")
.addEventListener("input", function(e){

    const value = e.target.value.toLowerCase();

    const filtered = attendees.filter(user =>

        (user.name || "")
        .toLowerCase()
        .includes(value)

        ||

        (user.email || "")
        .toLowerCase()
        .includes(value)

    );

    render(filtered);
});

loadData();

</script>

</body>
</html>
